<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="author" content="Thiago Ferreira">
    <meta name="description" content="A simple classifier for data learning and classification in Javascript">
    <meta name="keywords" content="perceptron, classifier, machine learning, javascript">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Perceptron">
    <meta name="robots" content="index, follow">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">

    <title>Perceptron in JS</title>
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Perceptron in JS</a>
        </div>
    </nav>

    <div class="container-fluid">

        <main>
            <div class="toolbar">
                <div class="row py-2">
                    <div class="col">
                        <button class="btn btn-primary" id="circle">Circle</button>
                        <button class="btn btn-outline-success" id="square">Square</button>
                    </div>
                </div>
            </div>
            <div>
                <div class="row">
                    <div class="col-lg-9 mb-0 mb-3 mb-lg-0">
                        <canvas id="canvas" width="500px"></canvas>
                    </div>
                    <div class="col-lg-3 mb-0 mb-3 mb-lg-0">
                        <div id="sidebar" class="card">
                            <div class="card-header">
                                <ul class="nav nav-tabs card-header-tabs">
                                    <li class="nav-item">
                                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#settings" data-i18n="settings">Settings</button>
                                    </li>
                                </ul>
                            </div>
                            <div class="card-body overflow-auto">
                                <div class="tab-content">
                                    <div class="tab-pane fade show active" id="settings">

                                        <form action="#" autocomplete="off">
                                            <div class="form-group form-check">
                                                <input type="checkbox" class="form-check-input" id="auto-training">
                                                <label class="form-check-label" for="auto-training">Auto Training</label>
                                            </div>
                                            <hr />
                                            <div class="mb-3">
                                                <label for="learning-rate" class="form-label">Learning Rate</label>
                                                <input type="number" class="form-control form-disable" id="learning-rate" min="0" step="0.0001" value="0.002" placeholder="Learning Rate" autocomplete="off">
                                            </div>
                                            <div class="mb-3">
                                                <label for="max-iterations" class="form-label">Max Iterations</label>
                                                <input type="number" class="form-control form-disable" id="max-iterations" min="0" step="1" value="100" max="100000" placeholder="Max Iterations" autocomplete="off">
                                            </div>
                                            <button class="btn btn-secondary form-disable" id="train">Train</button>
                                        </form>

                                    </div>
                                </div>
                            </div>
                        </div> <!-- sidebar -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/vendor/jquery-3.3.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script src="js/app/point.js"></script>
    <script src="js/app/perceptron.js"></script>
    <script src="js/app/drawer.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
